server:
  port: 80


spring:
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:db.sql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_ADDRESS}/${MYSQL_DATABASE:springboot_demo}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  mvc:
    view:
      suffix: .html
      prefix: /

mybatis:
  mapper-locations: classpath*:mapper/*Mapper.xml

wx:
  app-id: ${WX_APP_ID:}
  app-secret: ${WX_APP_SECRET:}
  dev-open-id: ${WX_DEV_OPEN_ID:local_dev_openid}
